<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker - Drive Sync</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .table-container::-webkit-scrollbar { height: 8px; }
        .table-container::-webkit-scrollbar-track { background: #f1f5f9; }
        .table-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-2 rounded-lg"><i data-lucide="briefcase" class="text-white w-5 h-5"></i></div>
                <h1 class="text-xl font-bold text-slate-900 hidden sm:block">JobTracker Pro</h1>
            </div>
            
            <div class="flex items-center gap-3">
                <button onclick="authorizeGoogleDrive()" id="driveBtn" class="bg-white border border-slate-300 text-slate-700 hover:bg-slate-50 px-4 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-2 shadow-sm">
                    <svg class="w-4 h-4" viewBox="0 0 87.3 57.8" xmlns="http://www.w3.org/2000/svg"><path d="M19.1 57.8l-19.1-33 14.5-24.8 19.1 33z" fill="#0066da"/><path d="M87.3 33l-19.1 33h-29l19.1-33z" fill="#00ac47"/><path d="M87.3 33h-38.2l-19.1-33h38.2z" fill="#ea4335"/></svg>
                    <span id="driveBtnText">Sync Drive</span>
                </button>

                <button onclick="toggleModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-2 shadow-sm">
                    <i data-lucide="plus" class="w-4 h-4"></i> <span class="hidden sm:inline">Add App</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        
        <div id="syncStatus" class="hidden mb-6 bg-blue-50 border border-blue-200 text-blue-700 px-4 py-3 rounded-lg flex items-center justify-between text-sm">
            <div class="flex items-center gap-2">
                <i data-lucide="refresh-cw" class="w-4 h-4 animate-spin hidden" id="syncSpinner"></i>
                <span id="syncMessage">Checking Google Drive...</span>
            </div>
            <button onclick="document.getElementById('syncStatus').classList.add('hidden')" class="text-blue-500 hover:text-blue-700"><i data-lucide="x" class="w-4 h-4"></i></button>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                <div class="bg-slate-100 p-3 rounded-full text-slate-600"><i data-lucide="layers" class="w-6 h-6"></i></div>
                <div><p class="text-sm text-slate-500 font-medium">Total Applications</p><h3 id="kpi-total" class="text-2xl font-bold text-slate-900">0</h3></div>
            </div>
            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                <div class="bg-blue-50 p-3 rounded-full text-blue-600"><i data-lucide="calendar" class="w-6 h-6"></i></div>
                <div><p class="text-sm text-slate-500 font-medium">Interviews</p><h3 id="kpi-interviews" class="text-2xl font-bold text-slate-900">0</h3></div>
            </div>
            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                <div class="bg-green-50 p-3 rounded-full text-green-600"><i data-lucide="award" class="w-6 h-6"></i></div>
                <div><p class="text-sm text-slate-500 font-medium">Offers Received</p><h3 id="kpi-offers" class="text-2xl font-bold text-slate-900">0</h3></div>
            </div>
            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                <div class="bg-red-50 p-3 rounded-full text-red-600"><i data-lucide="x-circle" class="w-6 h-6"></i></div>
                <div><p class="text-sm text-slate-500 font-medium">Rejections</p><h3 id="kpi-rejections" class="text-2xl font-bold text-slate-900">0</h3></div>
            </div>
        </div>

        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm mb-6 flex flex-col sm:flex-row gap-4 justify-between items-center">
            <div class="relative w-full sm:w-96">
                <i data-lucide="search" class="absolute left-3 top-2.5 text-slate-400 w-5 h-5"></i>
                <input type="text" id="searchInput" placeholder="Search by company or title..." class="w-full pl-10 pr-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
            </div>
            <select id="stageFilter" class="w-full sm:w-48 border border-slate-300 rounded-lg px-4 py-2 bg-white focus:ring-2 focus:ring-blue-500 outline-none">
                <option value="All">All Stages</option>
                <option value="Applied">Applied</option>
                <option value="Phone Screen">Phone Screen</option>
                <option value="Technical Test">Technical Test</option>
                <option value="Interview">Interview</option>
                <option value="Offer">Offer</option>
                <option value="Rejected">Rejected</option>
            </select>
        </div>

        <div class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
            <div class="overflow-x-auto table-container">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider border-b border-slate-200">
                            <th class="p-4 font-semibold">Company & Role</th>
                            <th class="p-4 font-semibold">Date Applied</th>
                            <th class="p-4 font-semibold">Stage</th>
                            <th class="p-4 font-semibold">Match Score</th>
                            <th class="p-4 font-semibold">Documents</th>
                            <th class="p-4 font-semibold text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="jobTableBody" class="divide-y divide-slate-100 text-sm"></tbody>
                </table>
            </div>
            <div id="emptyState" class="hidden flex-col items-center justify-center p-12 text-slate-500">
                <i data-lucide="inbox" class="w-12 h-12 text-slate-300 mb-3"></i>
                <p class="text-lg font-medium text-slate-700">No applications found</p>
                <p class="text-sm mt-1">Add a new job application to start tracking.</p>
            </div>
        </div>
    </main>

    <div id="jobModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto transform transition-all">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center sticky top-0 bg-white z-10">
                <h2 class="text-xl font-bold text-slate-800">Add Application</h2>
                <button onclick="toggleModal()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <form id="jobForm" class="p-6 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label class="block text-sm font-medium text-slate-700 mb-1">Company *</label><input type="text" id="companyName" required class="w-full border border-slate-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                    <div><label class="block text-sm font-medium text-slate-700 mb-1">Job Title *</label><input type="text" id="jobTitle" required class="w-full border border-slate-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label class="block text-sm font-medium text-slate-700 mb-1">Link</label><input type="url" id="jobLink" class="w-full border border-slate-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                    <div><label class="block text-sm font-medium text-slate-700 mb-1">Date *</label><input type="date" id="dateApplied" required class="w-full border border-slate-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none"></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Stage</label>
                        <select id="stage" class="w-full border border-slate-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
                            <option>Applied</option><option>Phone Screen</option><option>Technical Test</option><option>Interview</option><option>Offer</option><option>Rejected</option>
                        </select>
                    </div>
                    <div><label class="block text-sm font-medium text-slate-700 mb-1">Match (<span id="scoreVal">50</span>%)</label><input type="range" id="matchScore" min="0" max="100" value="50" oninput="document.getElementById('scoreVal').innerText = this.value" class="w-full mt-2 accent-blue-600"></div>
                </div>
                <div class="flex justify-end gap-3 pt-4 border-t border-slate-100">
                    <button type="button" onclick="toggleModal()" class="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg font-medium">Cancel</button>
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-medium">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- GOOGLE DRIVE CONFIGURATION ---
        const CLIENT_ID = '506582644998-t18juc9kh124jade50t3re2km9ng49as.apps.googleusercontent.com'; // <--- REPLACE THIS!
        const SCOPES = 'https://www.googleapis.com/auth/drive.file'; // Only allows access to files created by this app
        const FILENAME = 'job_tracker_data.json';
        
        let tokenClient;
        let accessToken = null;
        let driveFileId = null; // Stores the Drive file ID if it exists

        // State Management (Fallback to localStorage)
        let jobs = JSON.parse(localStorage.getItem('jobTrackerData')) || [];

        // Initialize UI
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            document.getElementById('dateApplied').valueAsDate = new Date();
            renderDashboard();
        });

        // Initialize Google Identity Services
        window.onload = function () {
            if(CLIENT_ID === 'PUT_YOUR_CLIENT_ID_HERE.apps.googleusercontent.com') {
                console.warn("Please add your Google Client ID for Drive Sync to work.");
                return;
            }
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: async (response) => {
                    if (response.error) {
                        showStatus('Error authenticating with Google.', false);
                        return;
                    }
                    accessToken = response.access_token;
                    document.getElementById('driveBtnText').innerText = 'Drive Synced';
                    await syncWithDrive();
                },
            });
        };

        function authorizeGoogleDrive() {
            if(!tokenClient) {
                alert("Please configure your Google Client ID in the HTML file first.");
                return;
            }
            tokenClient.requestAccessToken({prompt: 'consent'});
        }

        function showStatus(message, isLoading = false) {
            const statusBar = document.getElementById('syncStatus');
            statusBar.classList.remove('hidden');
            document.getElementById('syncMessage').innerText = message;
            if(isLoading) {
                document.getElementById('syncSpinner').classList.remove('hidden');
            } else {
                document.getElementById('syncSpinner').classList.add('hidden');
                setTimeout(() => statusBar.classList.add('hidden'), 4000);
            }
        }

        // --- DRIVE SYNC LOGIC ---
        async function syncWithDrive() {
            showStatus('Connecting to Google Drive...', true);
            try {
                // 1. Search to see if our JSON file already exists
                const searchRes = await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${FILENAME}' and trashed=false`, {
                    headers: { Authorization: `Bearer ${accessToken}` }
                });
                const searchData = await searchRes.json();

                if (searchData.files && searchData.files.length > 0) {
                    // File exists: Download and merge data
                    driveFileId = searchData.files[0].id;
                    showStatus('Found remote data. Downloading...', true);
                    
                    const fileRes = await fetch(`https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`, {
                        headers: { Authorization: `Bearer ${accessToken}` }
                    });
                    const driveJobs = await fileRes.json();
                    
                    // Simple merge: Use Drive data if it exists (Overwrites local)
                    if(driveJobs && driveJobs.length > 0) {
                        jobs = driveJobs;
                        localStorage.setItem('jobTrackerData', JSON.stringify(jobs));
                        renderDashboard();
                        showStatus('Successfully synced from Google Drive!', false);
                    } else {
                        // Drive is empty, upload our local data
                        await uploadToDrive();
                    }
                } else {
                    // File does not exist: Upload current localStorage to Drive
                    await uploadToDrive();
                }
            } catch (error) {
                console.error(error);
                showStatus('Error syncing with Drive. Check console.', false);
            }
        }

        async function uploadToDrive() {
            if (!accessToken) return; // If not authed, just skip Drive upload
            
            showStatus('Saving to Google Drive...', true);
            const metadata = { name: FILENAME, mimeType: 'application/json' };
            const fileContent = JSON.stringify(jobs);

            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
            form.append('file', new Blob([fileContent], { type: 'application/json' }));

            const url = driveFileId 
                ? `https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=multipart`
                : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;
            
            const method = driveFileId ? 'PATCH' : 'POST';

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { Authorization: `Bearer ${accessToken}` },
                    body: form
                });
                const data = await response.json();
                if(!driveFileId && data.id) driveFileId = data.id; // Save ID if newly created
                showStatus('Successfully saved to Google Drive!', false);
            } catch(e) {
                showStatus('Failed to upload to Drive.', false);
            }
        }

        // --- STANDARD APP LOGIC ---
        function toggleModal() {
            const modal = document.getElementById('jobModal');
            modal.classList.toggle('hidden');
            if(modal.classList.contains('hidden')) {
                document.getElementById('jobForm').reset();
                document.getElementById('scoreVal').innerText = "50";
            }
        }

        document.getElementById('jobForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newJob = {
                id: Date.now().toString(),
                company: document.getElementById('companyName').value,
                title: document.getElementById('jobTitle').value,
                link: document.getElementById('jobLink').value,
                date: document.getElementById('dateApplied').value,
                stage: document.getElementById('stage').value,
                match: document.getElementById('matchScore').value,
                documents: [] 
            };
            jobs.unshift(newJob);
            saveData();
            toggleModal();
            renderDashboard();
        });

        function deleteJob(id) {
            if(confirm('Delete this application?')) {
                jobs = jobs.filter(job => job.id !== id);
                saveData();
                renderDashboard();
            }
        }

        async function saveData() {
            // 1. Save to local storage immediately for fast UI
            localStorage.setItem('jobTrackerData', JSON.stringify(jobs));
            
            // 2. If authenticated with Drive, upload it silently in the background
            if(accessToken) {
                await uploadToDrive();
            }
        }

        // Stage Configuration (Colors & Badges)
        const stageConfig = {
            'Applied': 'bg-slate-100 text-slate-700 border-slate-200',
            'Phone Screen': 'bg-purple-100 text-purple-700 border-purple-200',
            'Technical Test': 'bg-orange-100 text-orange-700 border-orange-200',
            'Interview': 'bg-blue-100 text-blue-700 border-blue-200',
            'Offer': 'bg-green-100 text-green-700 border-green-200',
            'Rejected': 'bg-red-100 text-red-700 border-red-200'
        };

        function renderDashboard() {
            const searchQuery = document.getElementById('searchInput').value.toLowerCase();
            const stageFilter = document.getElementById('stageFilter').value;

            const filteredJobs = jobs.filter(job => {
                const matchesSearch = job.company.toLowerCase().includes(searchQuery) || job.title.toLowerCase().includes(searchQuery);
                const matchesStage = stageFilter === 'All' || job.stage === stageFilter;
                return matchesSearch && matchesStage;
            });

            document.getElementById('kpi-total').innerText = jobs.length;
            document.getElementById('kpi-interviews').innerText = jobs.filter(j => ['Interview', 'Phone Screen', 'Technical Test'].includes(j.stage)).length;
            document.getElementById('kpi-offers').innerText = jobs.filter(j => j.stage === 'Offer').length;
            document.getElementById('kpi-rejections').innerText = jobs.filter(j => j.stage === 'Rejected').length;

            const tbody = document.getElementById('jobTableBody');
            const emptyState = document.getElementById('emptyState');
            tbody.innerHTML = '';

            if(filteredJobs.length === 0) {
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
            } else {
                emptyState.classList.add('hidden');
                emptyState.classList.remove('flex');

                filteredJobs.forEach(job => {
                    const row = `
                        <tr class="hover:bg-slate-50 transition-colors group">
                            <td class="p-4 font-semibold text-slate-900">${job.company} <span class="block text-xs text-slate-500 font-normal mt-1">${job.title}</span></td>
                            <td class="p-4 text-slate-600">${new Date(job.date).toLocaleDateString()}</td>
                            <td class="p-4"><span class="px-2.5 py-1 rounded-full text-xs font-medium border ${stageConfig[job.stage]}">${job.stage}</span></td>
                            <td class="p-4 font-medium text-slate-700">${job.match}%</td>
                            <td class="p-4"><button onclick="deleteJob('${job.id}')" class="text-slate-400 hover:text-red-600 transition-colors"><i data-lucide="trash-2" class="w-5 h-5"></i></button></td>
                        </tr>`;
                    tbody.insertAdjacentHTML('beforeend', row);
                });
            }
            lucide.createIcons();
        }

        document.getElementById('searchInput').addEventListener('input', renderDashboard);
        document.getElementById('stageFilter').addEventListener('change', renderDashboard);
    </script>
</body>
</html>
