<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Custom scrollbar for table */
        .table-container::-webkit-scrollbar { height: 8px; }
        .table-container::-webkit-scrollbar-track { background: #f1f5f9; }
        .table-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-2 rounded-lg"><i data-lucide="briefcase" class="text-white w-5 h-5"></i></div>
                <h1 class="text-xl font-bold text-slate-900">JobTracker Pro</h1>
            </div>
            <button onclick="toggleModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-2 shadow-sm">
                <i data-lucide="plus" class="w-4 h-4"></i> Add Application
            </button>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                <div class="bg-slate-100 p-3 rounded-full text-slate-600"><i data-lucide="layers" class="w-6 h-6"></i></div>
                <div>
                    <p class="text-sm text-slate-500 font-medium">Total Applications</p>
                    <h3 id="kpi-total" class="text-2xl font-bold text-slate-900">0</h3>
                </div>
            </div>
            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                <div class="bg-blue-50 p-3 rounded-full text-blue-600"><i data-lucide="calendar" class="w-6 h-6"></i></div>
                <div>
                    <p class="text-sm text-slate-500 font-medium">Interviews</p>
                    <h3 id="kpi-interviews" class="text-2xl font-bold text-slate-900">0</h3>
                </div>
            </div>
            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                <div class="bg-green-50 p-3 rounded-full text-green-600"><i data-lucide="award" class="w-6 h-6"></i></div>
                <div>
                    <p class="text-sm text-slate-500 font-medium">Offers Received</p>
                    <h3 id="kpi-offers" class="text-2xl font-bold text-slate-900">0</h3>
                </div>
            </div>
            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                <div class="bg-red-50 p-3 rounded-full text-red-600"><i data-lucide="x-circle" class="w-6 h-6"></i></div>
                <div>
                    <p class="text-sm text-slate-500 font-medium">Rejections</p>
                    <h3 id="kpi-rejections" class="text-2xl font-bold text-slate-900">0</h3>
                </div>
            </div>
        </div>

        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm mb-6 flex flex-col sm:flex-row gap-4 justify-between items-center">
            <div class="relative w-full sm:w-96">
                <i data-lucide="search" class="absolute left-3 top-2.5 text-slate-400 w-5 h-5"></i>
                <input type="text" id="searchInput" placeholder="Search by company or title..." class="w-full pl-10 pr-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
            </div>
            <div class="flex gap-4 w-full sm:w-auto">
                <select id="stageFilter" class="w-full sm:w-48 border border-slate-300 rounded-lg px-4 py-2 bg-white focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="All">All Stages</option>
                    <option value="Applied">Applied</option>
                    <option value="Phone Screen">Phone Screen</option>
                    <option value="Technical Test">Technical Test</option>
                    <option value="Interview">Interview</option>
                    <option value="Offer">Offer</option>
                    <option value="Rejected">Rejected</option>
                </select>
            </div>
        </div>

        <div class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
            <div class="overflow-x-auto table-container">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider border-b border-slate-200">
                            <th class="p-4 font-semibold">Company & Role</th>
                            <th class="p-4 font-semibold">Date Applied</th>
                            <th class="p-4 font-semibold">Stage</th>
                            <th class="p-4 font-semibold">Match Score</th>
                            <th class="p-4 font-semibold">Documents</th>
                            <th class="p-4 font-semibold text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="jobTableBody" class="divide-y divide-slate-100 text-sm">
                        </tbody>
                </table>
            </div>
            
            <div id="emptyState" class="hidden flex flex-col items-center justify-center p-12 text-slate-500">
                <i data-lucide="inbox" class="w-12 h-12 text-slate-300 mb-3"></i>
                <p class="text-lg font-medium text-slate-700">No applications found</p>
                <p class="text-sm mt-1">Add a new job application to start tracking.</p>
            </div>
        </div>
    </main>

    <div id="jobModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto transform transition-all">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center sticky top-0 bg-white z-10">
                <h2 class="text-xl font-bold text-slate-800">Add New Application</h2>
                <button onclick="toggleModal()" class="text-slate-400 hover:text-slate-600 transition-colors">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            
            <form id="jobForm" class="p-6 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Company Name *</label>
                        <input type="text" id="companyName" required class="w-full border border-slate-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Job Title *</label>
                        <input type="text" id="jobTitle" required class="w-full border border-slate-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Job Board Link</label>
                        <input type="url" id="jobLink" placeholder="https://" class="w-full border border-slate-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Date Applied *</label>
                        <input type="date" id="dateApplied" required class="w-full border border-slate-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Application Stage</label>
                        <select id="stage" class="w-full border border-slate-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="Applied">Applied</option>
                            <option value="Phone Screen">Phone Screen</option>
                            <option value="Technical Test">Technical Test</option>
                            <option value="Interview">Interview</option>
                            <option value="Offer">Offer</option>
                            <option value="Rejected">Rejected</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Match Score (<span id="scoreVal">50</span>%)</label>
                        <input type="range" id="matchScore" min="0" max="100" value="50" oninput="document.getElementById('scoreVal').innerText = this.value" class="w-full mt-2 accent-blue-600">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Required Documents Submitted</label>
                    <div class="flex flex-wrap gap-4">
                        <label class="flex items-center gap-2 text-sm text-slate-600"><input type="checkbox" value="Resume" class="doc-checkbox rounded text-blue-600 focus:ring-blue-500"> Resume</label>
                        <label class="flex items-center gap-2 text-sm text-slate-600"><input type="checkbox" value="Cover Letter" class="doc-checkbox rounded text-blue-600 focus:ring-blue-500"> Cover Letter</label>
                        <label class="flex items-center gap-2 text-sm text-slate-600"><input type="checkbox" value="Portfolio" class="doc-checkbox rounded text-blue-600 focus:ring-blue-500"> Portfolio</label>
                        <label class="flex items-center gap-2 text-sm text-slate-600"><input type="checkbox" value="References" class="doc-checkbox rounded text-blue-600 focus:ring-blue-500"> References</label>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Job Description Keywords</label>
                    <input type="text" id="keywords" placeholder="e.g. React, Python, Agile (comma separated)" class="w-full border border-slate-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                
                <div class="flex justify-end gap-3 pt-4 border-t border-slate-100">
                    <button type="button" onclick="toggleModal()" class="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg font-medium transition-colors">Cancel</button>
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-medium transition-colors shadow-sm">Save Application</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // State Management
        let jobs = JSON.parse(localStorage.getItem('jobTrackerData')) || [];
        
        // Initialize Icons & UI on Load
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            document.getElementById('dateApplied').valueAsDate = new Date();
            renderDashboard();
        });

        // Modal Toggle
        const modal = document.getElementById('jobModal');
        function toggleModal() {
            modal.classList.toggle('hidden');
            if(modal.classList.contains('hidden')) {
                document.getElementById('jobForm').reset();
                document.getElementById('scoreVal').innerText = "50";
            }
        }

        // Add New Job
        document.getElementById('jobForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const docs = Array.from(document.querySelectorAll('.doc-checkbox:checked')).map(cb => cb.value);
            
            const newJob = {
                id: Date.now().toString(),
                company: document.getElementById('companyName').value,
                title: document.getElementById('jobTitle').value,
                link: document.getElementById('jobLink').value,
                date: document.getElementById('dateApplied').value,
                stage: document.getElementById('stage').value,
                match: document.getElementById('matchScore').value,
                documents: docs,
                keywords: document.getElementById('keywords').value
            };

            jobs.unshift(newJob); // Add to beginning
            saveData();
            toggleModal();
            renderDashboard();
        });

        // Delete Job
        function deleteJob(id) {
            if(confirm('Are you sure you want to delete this application?')) {
                jobs = jobs.filter(job => job.id !== id);
                saveData();
                renderDashboard();
            }
        }

        // Persist to LocalStorage
        function saveData() {
            localStorage.setItem('jobTrackerData', JSON.stringify(jobs));
        }

        // Stage Configuration (Colors & Badges)
        const stageConfig = {
            'Applied': 'bg-slate-100 text-slate-700 border-slate-200',
            'Phone Screen': 'bg-purple-100 text-purple-700 border-purple-200',
            'Technical Test': 'bg-orange-100 text-orange-700 border-orange-200',
            'Interview': 'bg-blue-100 text-blue-700 border-blue-200',
            'Offer': 'bg-green-100 text-green-700 border-green-200',
            'Rejected': 'bg-red-100 text-red-700 border-red-200'
        };

        function getMatchColor(score) {
            if (score >= 80) return 'text-green-600 bg-green-50';
            if (score >= 50) return 'text-yellow-600 bg-yellow-50';
            return 'text-red-600 bg-red-50';
        }

        // Render the Dashboard (KPIs and Table)
        function renderDashboard() {
            const searchQuery = document.getElementById('searchInput').value.toLowerCase();
            const stageFilter = document.getElementById('stageFilter').value;

            // Filter Logic
            const filteredJobs = jobs.filter(job => {
                const matchesSearch = job.company.toLowerCase().includes(searchQuery) || job.title.toLowerCase().includes(searchQuery);
                const matchesStage = stageFilter === 'All' || job.stage === stageFilter;
                return matchesSearch && matchesStage;
            });

            // Update KPIs based on total un-filtered data (or filtered, adjust as needed. Standard is total data)
            document.getElementById('kpi-total').innerText = jobs.length;
            document.getElementById('kpi-interviews').innerText = jobs.filter(j => j.stage === 'Interview' || j.stage === 'Phone Screen' || j.stage === 'Technical Test').length;
            document.getElementById('kpi-offers').innerText = jobs.filter(j => j.stage === 'Offer').length;
            document.getElementById('kpi-rejections').innerText = jobs.filter(j => j.stage === 'Rejected').length;

            // Render Table
            const tbody = document.getElementById('jobTableBody');
            const emptyState = document.getElementById('emptyState');
            tbody.innerHTML = '';

            if(filteredJobs.length === 0) {
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
            } else {
                emptyState.classList.add('hidden');
                emptyState.classList.remove('flex');

                filteredJobs.forEach(job => {
                    // Document pills
                    const allDocs = ['Resume', 'Cover Letter', 'Portfolio', 'References'];
                    const docsHTML = allDocs.map(d => {
                        const hasDoc = job.documents.includes(d);
                        return `<span class="inline-flex items-center gap-1 text-[10px] px-1.5 py-0.5 rounded-full border ${hasDoc ? 'bg-blue-50 border-blue-200 text-blue-700' : 'bg-slate-50 border-slate-200 text-slate-400 line-through'}">${d}</span>`;
                    }).join(' ');

                    const row = `
                        <tr class="hover:bg-slate-50 transition-colors group">
                            <td class="p-4">
                                <div class="font-semibold text-slate-900">${job.company}</div>
                                <div class="text-slate-500 text-xs flex items-center gap-2 mt-1">
                                    ${job.title}
                                    ${job.link ? `<a href="${job.link}" target="_blank" class="text-blue-500 hover:underline"><i data-lucide="external-link" class="w-3 h-3"></i></a>` : ''}
                                </div>
                            </td>
                            <td class="p-4 text-slate-600 whitespace-nowrap">${new Date(job.date).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric'})}</td>
                            <td class="p-4">
                                <span class="px-2.5 py-1 rounded-full text-xs font-medium border ${stageConfig[job.stage]}">
                                    ${job.stage}
                                </span>
                            </td>
                            <td class="p-4">
                                <div class="flex items-center gap-2">
                                    <div class="w-16 h-2 bg-slate-100 rounded-full overflow-hidden">
                                        <div class="h-full ${getMatchColor(job.match).split(' ')[0].replace('text', 'bg')}" style="width: ${job.match}%"></div>
                                    </div>
                                    <span class="text-xs font-semibold px-2 py-0.5 rounded ${getMatchColor(job.match)}">${job.match}%</span>
                                </div>
                            </td>
                            <td class="p-4">
                                <div class="flex flex-wrap gap-1 max-w-[150px]">
                                    ${docsHTML}
                                </div>
                            </td>
                            <td class="p-4 text-right">
                                <button onclick="deleteJob('${job.id}')" class="text-slate-400 hover:text-red-600 transition-colors opacity-0 group-hover:opacity-100">
                                    <i data-lucide="trash-2" class="w-5 h-5"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                    tbody.insertAdjacentHTML('beforeend', row);
                });
            }
            // Re-initialize icons for newly added DOM elements
            lucide.createIcons();
        }

        // Event Listeners for Filters
        document.getElementById('searchInput').addEventListener('input', renderDashboard);
        document.getElementById('stageFilter').addEventListener('change', renderDashboard);
    </script>
</body>
</html>
